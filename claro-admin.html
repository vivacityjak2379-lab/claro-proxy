<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Claro Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#111214;color:#E8E5DF;min-height:100vh;-webkit-font-smoothing:antialiased;}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem;padding:2rem;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:#E8E5DF;}
.login-logo span{color:#6BA8B4;}
.login-sub{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#44484F;margin-bottom:.5rem;}
.login-input{padding:.85rem 1.1rem;border-radius:12px;border:1px solid #22262B;background:#17191C;color:#E8E5DF;font-size:14px;font-family:'DM Sans',sans-serif;width:100%;max-width:300px;outline:none;}
.login-input:focus{border-color:#5B8A94;}
.login-btn{padding:.85rem 2rem;border-radius:50px;border:none;background:#E8E5DF;color:#111214;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;max-width:300px;}
.login-err{font-size:13px;color:#b04040;display:none;}

.app{display:none;flex-direction:column;min-height:100vh;}
.topbar{padding:1rem 1.5rem;border-bottom:1px solid #1E2226;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;}
.topbar-logo span{color:#6BA8B4;}
.topbar-right{display:flex;align-items:center;gap:.75rem;}
.topbar-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#0F2226;color:#6BA8B4;border:1px solid #163038;}
.logout-btn{font-size:12px;color:#44484F;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.logout-btn:hover{color:#88867F;}

.main{padding:1.5rem;max-width:1000px;margin:0 auto;width:100%;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{background:#17191C;border:1px solid #1E2226;border-radius:12px;padding:1rem 1.25rem;}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:#E8E5DF;}
.stat-l{font-size:12px;color:#44484F;margin-top:2px;}

/* SEARCH */
.search-bar{display:flex;gap:.75rem;margin-bottom:1.25rem;}
.search-input{flex:1;padding:.75rem 1rem;border-radius:10px;border:1px solid #1E2226;background:#17191C;color:#E8E5DF;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.search-input:focus{border-color:#3D6B74;}
.search-btn{padding:.75rem 1.25rem;border-radius:10px;border:none;background:#5B8A94;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}

/* USERS TABLE */
.table-wrap{background:#17191C;border:1px solid #1E2226;border-radius:14px;overflow:hidden;overflow-x:auto;}
.table-header{padding:.75rem 1.1rem;border-bottom:1px solid #1E2226;display:grid;grid-template-columns:2fr 70px 110px 110px 1fr 170px;gap:1rem;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#44484F;min-width:760px;}
.table-row{padding:.75rem 1.1rem;border-bottom:1px solid #1E2226;display:grid;grid-template-columns:2fr 70px 110px 110px 1fr 170px;gap:1rem;align-items:center;min-width:760px;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:#1E2226;}
.tr-uid{font-size:11px;color:#44484F;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tr-email{font-size:13px;color:#88867F;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tr-plan{font-size:11px;padding:2px 8px;border-radius:20px;text-align:center;font-weight:500;display:inline-block;}
.tr-plan.pro{background:#251A10;color:#C4956A;}
.tr-plan.free{background:#1E2226;color:#44484F;}
.tr-date{font-size:11px;color:#44484F;font-family:monospace;}
.tr-actions{display:flex;gap:.4rem;}
.plan-btn{padding:.35rem .7rem;border-radius:20px;border:1px solid #22262B;background:transparent;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;color:#88867F;}
.plan-btn:hover{border-color:#3D6B74;color:#6BA8B4;}
.plan-btn.active{cursor:default;}
.plan-btn.pro.active{background:#251A10;color:#C4956A;border-color:rgba(196,149,106,.4);}
.plan-btn.free.active{background:#1E2226;color:#88867F;border-color:#2C3138;}
.empty{padding:2rem;text-align:center;color:#44484F;font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.75rem 1.25rem;border-radius:12px;background:#5B8A94;color:#fff;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}

/* REFRESH */
.refresh-btn{padding:.55rem 1rem;border-radius:20px;border:1px solid #22262B;background:transparent;font-size:12px;color:#88867F;font-family:'DM Sans',sans-serif;cursor:pointer;}
.refresh-btn:hover{border-color:#3D6B74;color:#6BA8B4;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="login-logo">Clar<span>o</span></div>
  <div class="login-sub">Admin Panel</div>
  <input class="login-input" type="password" id="pwdInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
  <button class="login-btn" onclick="doLogin()">Sign in</button>
  <div class="login-err" id="loginErr">Wrong password</div>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <div class="topbar">
    <div class="topbar-logo">Clar<span>o</span> Admin</div>
    <div class="topbar-right">
      <div class="topbar-badge" id="proxyUrl">—</div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="stats">
      <div class="stat"><div class="stat-n" id="statTotal">—</div><div class="stat-l">Total users</div></div>
      <div class="stat"><div class="stat-n" id="statPro" style="color:#C4956A;">—</div><div class="stat-l">Pro subscribers</div></div>
      <div class="stat"><div class="stat-n" id="statFree">—</div><div class="stat-l">Free users</div></div>
    </div>

    <!-- SEARCH -->
    <div class="search-bar">
      <input class="search-input" type="text" id="searchInput" placeholder="Search by UID or email..." oninput="filterUsers()"/>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-header">
        <div>Email</div>
        <div>Plan</div>
        <div>Registered</div>
        <div>Updated</div>
        <div>UID</div>
        <div>Actions</div>
      </div>
      <div id="usersTable"><div class="empty">Loading...</div></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROXY = 'https://grand-respect-production-f3b0.up.railway.app';
let adminPwd = '';
let allUsers = [];

function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  adminPwd = pwd;
  // Try to fetch stats to verify password
  fetch(PROXY + '/admin/stats', {
    headers: { 'x-admin-password': pwd }
  }).then(r => {
    if (r.ok) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'flex';
      document.getElementById('proxyUrl').textContent = 'Railway ✓';
      loadData();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }).catch(() => {
    // If proxy not reachable, still allow local demo mode
    document.getElementById('loginErr').textContent = 'Cannot reach proxy. Check URL.';
    document.getElementById('loginErr').style.display = 'block';
  });
}

function logout() {
  adminPwd = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('pwdInput').value = '';
}

async function loadData() {
  try {
    const [statsRes, usersRes] = await Promise.all([
      fetch(PROXY + '/admin/stats', { headers: { 'x-admin-password': adminPwd } }),
      fetch(PROXY + '/admin/users', { headers: { 'x-admin-password': adminPwd } })
    ]);
    const stats = await statsRes.json();
    const data = await usersRes.json();
    
    document.getElementById('statTotal').textContent = stats.total || 0;
    document.getElementById('statPro').textContent = stats.pro || 0;
    document.getElementById('statFree').textContent = stats.free || 0;
    
    allUsers = data.users || [];
    renderTable(allUsers);
  } catch(e) {
    toast('Error loading data: ' + e.message, true);
  }
}

function fmtDate(v) {
  return v ? String(v).slice(0,19).replace('T',' ') : '—';
}

function renderTable(users) {
  const el = document.getElementById('usersTable');
  if (!users.length) {
    el.innerHTML = '<div class="empty">No users found</div>';
    return;
  }
  el.innerHTML = users.map(u => `
    <div class="table-row">
      <div class="tr-email">${u.email || '—'}</div>
      <div><span class="tr-plan ${u.plan}">${u.plan.toUpperCase()}</span></div>
      <div class="tr-date">${fmtDate(u.created_at)}</div>
      <div class="tr-date">${fmtDate(u.updated_at)}</div>
      <div class="tr-uid">${u.uid}</div>
      <div class="tr-actions">
        <button class="plan-btn pro ${u.plan === 'pro' ? 'active' : ''}" ${u.plan === 'pro' ? 'disabled' : ''} onclick="setPlan('${u.uid}','pro')">Set Pro</button>
        <button class="plan-btn free ${u.plan === 'free' ? 'active' : ''}" ${u.plan === 'free' ? 'disabled' : ''} onclick="setPlan('${u.uid}','free')">Set Free</button>
      </div>
    </div>
  `).join('');
}

function filterUsers() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderTable(allUsers); return; }
  renderTable(allUsers.filter(u =>
    (u.email || '').toLowerCase().includes(q) ||
    u.uid.toLowerCase().includes(q)
  ));
}

async function setPlan(uid, plan) {
  const u = allUsers.find(x => x.uid === uid);
  const label = (u && u.email) ? u.email : uid;
  if (!confirm(`Set ${label} to ${plan.toUpperCase()}?`)) return;

  try {
    const res = await fetch(PROXY + '/admin/users/' + uid + '/plan', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': adminPwd
      },
      body: JSON.stringify({ plan })
    });
    if (res.ok) {
      toast(plan === 'pro' ? '✦ Pro granted' : '✕ Set to free');
      await loadData();
      filterUsers();
    } else {
      const data = await res.json().catch(() => ({}));
      toast('Error: ' + (data.error || res.status), true);
    }
  } catch(e) {
    toast('Error: ' + e.message, true);
  }
}

function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isErr ? '#b04040' : '#5B8A94';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
